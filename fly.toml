# fly.toml — Cover, CAPE Creative case studies app
# See https://fly.io/docs/reference/configuration/

app = 'cape-cover'
primary_region = 'ewr'

[build]

[env]
  PORT = '4040'
  COVER_ALLOWED_DOMAIN = 'capecreative.co'

[http_service]
  internal_port = 4040
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[mounts]
  source = 'cover_data'
  destination = '/app/data'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
